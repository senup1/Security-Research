<div class='page'><h1 class='title'>Blind SQL injection</h1><br/><p>Blind SQL injection occurs when an application is vulnerable to SQLi, but its HTTP responses do not contian the results of SQL queries or database errors.</p><p></p><p>Many techniques such as the UNION attack are not effective with blind SQLi.</p></div>
