<div class='page'><h1 class='title'>Types of NoSQL injection</h1><br/><p>There are two types:<ul><li>Sytax injection: Occurs when breaking out of NoSQL query syntax enabling custom payload</li><li>Operator injection: Occurs when NoSQL operators can manipulate query</li></ul></p><p></p><p>MongoDB is the most popular NoSQL database</p></div>
