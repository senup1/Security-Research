<div class='page'><h1 class='title'>How to detect SQL injection vulnerabilities</h1><br/><p>Most SQL injection vulnerabilities occur within the WHERE clause of a SELECT query.</p><p></p><p>Some other common locations where SQL injections arise are:</p><p>UPDATE statements </p><p>INSERT statements</p><p>SELECT statements within the table/column name or ORDER BY clause</p></div>
